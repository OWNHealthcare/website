<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWN Health – Das Konto für deine Gesundheit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section class="hero">

    <a href="#" class="logo" aria-label="OWN Health">
      <svg width="47" height="47" viewBox="0 0 46.9117 46.9117" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7.63213 23.4559C7.63213 14.7167 14.7167 7.63213 23.4559 7.63213C32.195 7.63213 39.2482 14.5335 39.2482 23.2726C39.2482 23.7172 39.2297 24.32 39.2232 24.7743H46.8738C46.8976 24.3374 46.9117 23.8982 46.9117 23.4559C46.9106 10.5011 36.4096 0 23.4559 0C10.5022 0 0 10.5011 0 23.4559C0 36.4106 10.5011 46.9117 23.4559 46.9117C23.8191 46.9117 24.1791 46.902 24.538 46.8857V39.2417C24.1802 39.2655 23.8202 39.2796 23.4559 39.2796C14.7167 39.2796 7.63213 32.195 7.63213 23.4559Z" fill="#232729"/>
        <path d="M39.1581 24.7742H31.8621V46.9116H39.1581V24.7742Z" fill="#232729"/>
        <path d="M46.0551 39.2846V31.9886H24.6083V39.2846H46.0551Z" fill="#232729"/>
      </svg>
    </a>

    <div class="hero__content">
      <h1 class="hero__title">Das Konto für<br>deine Gesundheit</h1>
      <p class="hero__subtitle">Alle deine Gesundheitsdaten an einem Ort.<br>Sicher, privat und jederzeit griffbereit.</p>

      <form class="waitlist" id="waitlist-form" action="/api/waitlist" method="post" novalidate>
        <input type="email" name="email" class="waitlist__input" placeholder="DEINE EMAIL" autocomplete="email" required>
        <!-- Honeypot gegen Bots: für Menschen unsichtbar -->
        <input type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true"
               style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;">
        <button type="submit" class="waitlist__btn" id="waitlist-btn">IN WARTELISTE EINTRAGEN</button>
      </form>

    </div>

    <!-- Toast-Popup für Formular-Feedback -->
    <div id="waitlist-toast" role="status" aria-live="polite" style="
        position:absolute;top:36px;left:50%;z-index:50;
        display:flex;align-items:center;gap:12px;
        max-width:min(92%,560px);padding:16px 26px;
        background:linear-gradient(160deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,.35) 100%);
        border:0.5px solid rgba(255,255,255,.6);border-radius:100px;
        backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);
        box-shadow:inset 0 0.5px 0 0 rgba(255,255,255,.7),0 12px 40px rgba(0,0,0,.18);
        font-family:'Google Sans',sans-serif;font-size:15px;font-weight:500;line-height:1.4;color:#132532;
        opacity:0;visibility:hidden;transform:translate(-50%,-16px);
        transition:opacity .35s ease,transform .35s ease,visibility .35s;">
      <span id="waitlist-toast-icon" aria-hidden="true" style="
          display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
          width:26px;height:26px;border-radius:50%;background:#132532;color:#fff;"></span>
      <span id="waitlist-toast-text"></span>
    </div>

    <nav class="footer-nav">
      <a href="impressum.html" class="footer-nav__link">IMPRESSUM</a>
      <a href="datenschutz.html" class="footer-nav__link">DATENSCHUTZ</a>
      <a href="agb.html" class="footer-nav__link">AGB</a>
    </nav>

  </section>

  <script>
    (function () {
      var form  = document.getElementById('waitlist-form');
      var btn   = document.getElementById('waitlist-btn');
      var toast = document.getElementById('waitlist-toast');
      var tIcon = document.getElementById('waitlist-toast-icon');
      var tText = document.getElementById('waitlist-toast-text');
      var input = form.querySelector('input[name="email"]');
      var label = btn.textContent;
      var hideTimer;

      var CHECK = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      var CROSS = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>';

      function show(msg, ok) {
        clearTimeout(hideTimer);
        tText.textContent = msg;
        tIcon.innerHTML = ok ? CHECK : CROSS;
        tIcon.style.background = ok ? '#132532' : '#8f2323';
        toast.style.visibility = 'visible';
        toast.style.opacity = '1';
        toast.style.transform = 'translate(-50%, 0)';
        hideTimer = setTimeout(function () {
          toast.style.opacity = '0';
          toast.style.transform = 'translate(-50%, -16px)';
          toast.style.visibility = 'hidden';
        }, ok ? 5000 : 6500);
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        var email = input.value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) {
          show('Bitte gib eine gültige E-Mail-Adresse ein.', false);
          input.focus();
          return;
        }

        btn.disabled = true;
        btn.textContent = 'WIRD GESENDET …';

        try {
          var res = await fetch('/api/waitlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: email,
              website: form.querySelector('input[name="website"]').value
            })
          });
          var data = await res.json().catch(function () { return {}; });

          if (!res.ok) {
            show(data.error || 'Da ist etwas schiefgelaufen. Bitte später erneut versuchen.', false);
            return;
          }

          if (data.status === 'already_confirmed') {
            show('Du stehst bereits auf der Warteliste.', true);
          } else {
            show('Fast geschafft – bitte bestätige den Link in deiner E-Mail.', true);
          }
          form.reset();
        } catch (err) {
          show('Keine Verbindung zum Server. Bitte später erneut versuchen.', false);
        } finally {
          btn.disabled = false;
          btn.textContent = label;
        }
      });
    })();
  </script>

</body>
</html>
